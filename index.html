<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор расписания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Конструктор расписания</h1>

    <div class="controls">
        <button id="manualBtn">Ручное добавление</button>
        <button id="autoBtn">Автоматическая генерация</button>
        <button id="saveBtn">Сохранить расписание в файл</button>
        <input type="file" id="fileInput" style="display:none" />
        <button id="loadBtn">📂 Загрузить расписание из файла</button>
    </div>

    <div class="mode-wrapper">
        <div id="manual" class="mode">
            <input id="subject" type="text" placeholder="Название предмета">
            
            <select id="type">
                <option>Лекция</option>
                <option>Практика</option>
            </select>
            
            <select id="day">
                <option>Пн</option>
                <option>Вт</option>
                <option>Ср</option>
                <option>Чт</option>
                <option>Пт</option>
                <option>Сб</option>
                <option>Вс</option>
            </select>

            <select id="slot">
                <option>1 пара</option>
                <option>2 пара</option>
                <option>3 пара</option>
                <option>4 пара</option>
                <option>5 пара</option>
                <option>6 пара</option>
            </select>

            <button id="addBtn">Добавить</button>
        </div>

        <div id="auto" class="mode" style="display: none;">
            <input id="autoSubject" type="text" placeholder="Название предмета">
            
            <select id="autoType">
                <option>Лекция</option>
                <option>Практика</option>
            </select>

            <button id="autoAddBtn">Добавить в список</button>
            <button id="genBtn">Сгенерировать</button>
            <button id="clearBtn">Очистить список</button>

            <div id="listInfo">
                <strong>Список предметов:</strong> <span id="countInfo">0 (0 лекций, 0 практик)</span>
            </div>
            <ul id="subjectList"></ul>
        </div>
    </div>

    <table id="schedule">
        <thead>
            <tr>
                <th></th>
                <th>Пн</th>
                <th>Вт</th>
                <th>Ср</th>
                <th>Чт</th>
                <th>Пт</th>
                <th>Сб</th>
                <th>Вс</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>1 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>2 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>3 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>4 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>5 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td>6 пара</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
